{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:600px">
    <div class="auth-logo">
      <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
      <span class="brand-text">HealthGuard<span class="brand-accent">AI</span></span>
    </div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join HealthGuard AI to start monitoring your health</p>
    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="first_name" class="form-control" placeholder="First name">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="last_name" class="form-control" placeholder="Last name">
        </div>
      </div>
      <div class="form-group">
        <label>Username *</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" class="form-control" placeholder="+91 XXXXX XXXXX">
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Password *</label>
          <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" name="password2" class="form-control" placeholder="Repeat password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
