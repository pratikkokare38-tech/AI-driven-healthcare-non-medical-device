{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto;">
    <div class="card">
        <div class="card-header" style="text-align: center;">
            <i class="fas fa-key" style="font-size: 24px; color: var(--primary);"></i>
            <h2 style="margin-top: 12px; margin-bottom: 0;">Reset Password</h2>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Verification Code</label>
                <input type="text" name="otp" placeholder="000000" maxlength="6" required
                       style="font-size: 24px; text-align: center; letter-spacing: 8px;">
            </div>
            
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="At least 6 characters" required>
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
                <i class="fas fa-check"></i> Reset Password
            </button>
            
            <a href="{% url 'login' %}" style="display: block; text-align: center; margin-top: 16px; color: var(--primary); text-decoration: none;">
                Back to Login
            </a>
        </form>
    </div>
</div>
{% endblock %}
