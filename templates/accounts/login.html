{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
      <span class="brand-text">HealthGuard<span class="brand-accent">AI</span></span>
    </div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to your health monitoring account</p>
    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        <a href="{% url 'forgot_password' %}" style="font-size: 12px; color: var(--primary); text-decoration: none; margin-top: 4px; display: inline-block;">
          Forgot password?
        </a>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:8px">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
