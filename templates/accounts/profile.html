{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div class="card form-card">
    <div class="card-header">
        <i class="fas fa-user-edit"></i> Edit Profile
    </div>
    <form method="post" enctype="multipart/form-data" class="auth-form">
        {% csrf_token %}
        
        <!-- Profile Picture Section -->
        {% if user.profile_picture %}
        <div style="margin-bottom: 24px; text-align: center;">
            <img src="{{ user.profile_picture.url }}" alt="Profile Picture" style="width: 120px; height: 120px; border-radius: 12px; object-fit: cover; border: 2px solid var(--primary); box-shadow: 0 4px 12px rgba(99,102,241,0.3);">
        </div>
        {% endif %}
        
        <div class="form-grid">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" class="form-control" value="{{ user.phone }}">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" class="form-control">
                    <option value="">Select Gender</option>
                    <option value="male" {% if user.gender == 'male' %}selected{% endif %}>Male</option>
                    <option value="female" {% if user.gender == 'female' %}selected{% endif %}>Female</option>
                    <option value="other" {% if user.gender == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>
        </div>
        <div class="form-group mt-4">
            <label>Address</label>
            <textarea name="address" class="form-control" rows="3">{{ user.address }}</textarea>
        </div>
        <div class="form-group mt-4">
            <label for="profile-pic">Profile Picture</label>
            <div style="position: relative; display: flex; align-items: center; gap: 12px;">
                <input type="file" name="profile_picture" id="profile-pic" class="form-control" accept="image/*" onchange="previewImage(event)" style="flex: 1;">
            </div>
            <img id="preview" style="margin-top: 12px; max-width: 200px; border-radius: 8px; display: none;">
            {% if user.profile_picture %}
                <div style="margin-top: 8px; font-size: 12px; color: var(--text-muted);">
                    <i class="fas fa-check-circle" style="color: #10b981;"></i> Current image uploaded
                </div>
            {% endif %}
        </div>
        <div class="mt-4" style="text-align: right;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
        </div>
    </form>
</div>

<script>
function previewImage(event) {
    const preview = document.getElementById('preview');
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}
</script>

<style>
    img {
        max-width: 100%;
        height: auto;
    }
</style>
{% endblock %}
