{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto;">
    <div class="card">
        <div class="card-header" style="text-align: center;">
            <i class="fas fa-lock" style="font-size: 24px; color: var(--primary);"></i>
            <h2 style="margin-top: 12px; margin-bottom: 0;">Reset Password</h2>
        </div>
        
        <p style="color: var(--text-muted); text-align: center; margin: 16px 0;">
            Enter your email or username to receive a verification code on your registered phone
        </p>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Email or Username</label>
                <input type="text" name="email_or_username" placeholder="Enter your email or username" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
                <i class="fas fa-paper-plane"></i> Send OTP
            </button>
            
            <a href="{% url 'login' %}" style="display: block; text-align: center; margin-top: 16px; color: var(--primary); text-decoration: none;">
                Back to Login
            </a>
        </form>
    </div>
</div>
{% endblock %}
