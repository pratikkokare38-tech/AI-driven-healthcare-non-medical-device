{% extends 'base.html' %}
{% block title %}Verify Phone{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto;">
    <div class="card">
        <div class="card-header" style="text-align: center;">
            <i class="fas fa-mobile-alt" style="font-size: 24px; color: var(--primary);"></i>
            <h2 style="margin-top: 12px; margin-bottom: 0;">Verify Phone</h2>
        </div>
        
        <p style="color: var(--text-muted); text-align: center; margin: 16px 0;">
            We sent a code to <strong>{{ user.phone }}</strong>
        </p>
        
        <!-- Test OTP Display (Remove in Production) -->
        {% if messages %}
            <div style="background: var(--secondary); color: white; padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: center; font-weight: bold;">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Enter 6-digit OTP</label>
                <input type="text" name="otp" placeholder="000000" maxlength="6" 
                       required style="font-size: 24px; text-align: center; letter-spacing: 8px;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
                <i class="fas fa-check"></i> Verify
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <p style="font-size: 12px; color: var(--text-muted);">
                Didn't receive code?
                <a href="{% url 'resend_otp' user.id %}" style="color: var(--primary); text-decoration: none;">
                    Resend
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
